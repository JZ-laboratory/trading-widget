<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trading News</title>

  <style>
    html, body {
      margin: 0;
      padding: 8px;
      background: #191919;
      color-scheme: dark;
    }

    .box {
      width: 100%;
      height: 80px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }

    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>

    <script
      type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
      async>
    {
      "feedMode": "all_symbols",
      "colorTheme": "dark",
      "isTransparent": false,
      "displayMode": "adaptive",
      "width": "100%",
      "height": "100%",
      "locale": "en"
    }
    </script>

  </div>
</div>

</body>
</html>
