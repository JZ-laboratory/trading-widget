<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Economic Calendar - EU</title>

  <style>
    html, body {
      margin: 0;
      padding: 1px;
      background: #191919;
      color-scheme: dark;
      font-family: sans-serif;
    }

    .box {
      width: 450px;
      height: 500px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }

    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script
        type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-events.js"
        async>
      {
        "colorTheme": "dark",
        "isTransparent": false,
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "importanceFilter": "1",
        "currencyFilter": "EUR,GBP"
      }
      </script>
    </div>
  </div>
</body>
</html>
