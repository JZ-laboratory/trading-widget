Použij přesně tenhle kód do ticker_tape.html:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingView Ticker Tape</title>
  <style>
    :root {
      --bar-height: 40px;
      --bg: #0f1115;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: var(--bar-height);
      min-height: var(--bar-height);
      max-height: var(--bar-height);
      overflow: hidden;
      background: var(--bg);
    }

    body {
      position: relative;
      display: block;
    }

    .bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--bar-height);
      min-height: var(--bar-height);
      max-height: var(--bar-height);
      overflow: hidden;
      background: var(--bg);
      z-index: 9999;
    }

    .tradingview-widget-container {
      width: 100%;
      height: var(--bar-height) !important;
      min-height: var(--bar-height) !important;
      max-height: var(--bar-height) !important;
      overflow: hidden;
      background: var(--bg) !important;
    }

    .tradingview-widget-container__widget {
      width: 100%;
      height: var(--bar-height) !important;
      min-height: var(--bar-height) !important;
      max-height: var(--bar-height) !important;
      overflow: hidden;
      background: var(--bg) !important;
    }

    iframe {
      width: 100% !important;
      height: var(--bar-height) !important;
      min-height: var(--bar-height) !important;
      max-height: var(--bar-height) !important;
      border: 0 !important;
      background: var(--bg) !important;
      display: block !important;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script
        type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
        async
      >
      {
        "symbols": [
          { "proName": "FOREXCOM:SPXUSD", "title": "S&P500" },
          { "proName": "FOREXCOM:NSXUSD", "title": "US100" },
          { "proName": "FOREXCOM:DJI", "title": "US30" },
          { "proName": "FX:EURUSD", "title": "EURUSD" },
          { "proName": "NASDAQ:TSLA", "title": "TESLA" }
          { "proName": "BINANCE:ETHUSDT", "title": "ETHUSDT" },
          { "proName": "BINANCE:BTCUSDT", "title": "BTCUSDT" },
        ],
        "showSymbolLogo": true,
        "isTransparent": false,
        "displayMode": "adaptive",
        "colorTheme": "dark",
        "locale": "en"
      }
      </script>
    </div>
  </div>
</body>
</html>
