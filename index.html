<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ticker Tape</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 50px;
      overflow: hidden;
      background: #0f1115;
    }

    .wrap {
      height: 50px;
      width: 100%;
      overflow: hidden;
      background: #0f1115;
      display: flex;
      align-items: center;
    }

    tv-ticker-tape {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="wrap">
  <tv-ticker-tape
    symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD"
    hide-chart
    hover-type="chart">
  </tv-ticker-tape>
</div>

<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

</body>
</html>
