<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom Market Panel</title>

<style>
body {
  margin: 0;
  background: #0f1115;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 80px;
}

.asset {
  text-align: center;
  width: 120px;
}

.name {
  font-size: 12px;
  color: #aaa;
}

.price {
  font-size: 18px;
  font-weight: bold;
}

.change {
  font-size: 12px;
}

.green { color: #00c853; }
.red { color: #ff5252; }
</style>

</head>

<body>

<div class="container">

  <div class="asset">
    <div class="name">BTC</div>
    <div class="price" id="btc-price">--</div>
    <div class="change" id="btc-change">--</div>
  </div>

  <div class="asset">
    <div class="name">ETH</div>
    <div class="price" id="eth-price">--</div>
    <div class="change" id="eth-change">--</div>
  </div>

  <div class="asset">
    <div class="name">EURUSD</div>
    <div class="price" id="eurusd-price">--</div>
    <div class="change" id="eurusd-change">--</div>
  </div>

</div>

<script>
// jednoduchá fake data (můžeme pak napojit live)
function update() {
  document.getElementById("btc-price").innerText = "65,200";
  document.getElementById("btc-change").innerText = "-2.1%";

  document.getElementById("eth-price").innerText = "3,500";
  document.getElementById("eth-change").innerText = "-1.2%";

  document.getElementById("eurusd-price").innerText = "1.1530";
  document.getElementById("eurusd-change").innerText = "+0.04%";
}

update();
</script>

</body>
</html>
