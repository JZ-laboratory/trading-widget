<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ticker Tape</title>

  <style>
    html, body {
      margin: 0;
      padding: 10px;
      background: transparent;
    }

    .box {
      width: 100%;
      height: 90px;
      background: #0f1115;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    tv-ticker-tape {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="box">
  <tv-ticker-tape
    symbols="FOREXCOM:SPXUSD,NASDAQ:NDX,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,OANDA:XAUUSD"
    hide-chart
    hover-type="chart">
  </tv-ticker-tape>
</div>

<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

</body>
</html>
