<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ticker Tape</title>
  <style>
    html, body {
      margin: 0;
      padding: 8px;
      background: #191919;
      color-scheme: dark;
    }

    .box {
      width: 100%;
      height: 80px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    tv-ticker-tape {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="box">
    <tv-ticker-tape
      symbols="NASDAQ:NsXusd,FOREXCOM:SPXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,OANDA:XAUUSD"
      theme="dark"
      locale="en"
      hide-chart
      hover-type="chart">
    </tv-ticker-tape>
  </div>

  <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
</body>
</html>
