<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Myfxbook Toolbar</title>
  <style>
    html, body {
      margin: 0;
      padding: 10px;
      background: #191919;
      color-scheme: dark;
    }

    .box {
      width: 100%;
      min-height: 70px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .inner {
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="inner">
      <script type="text/javascript" src="https://widgets.myfxbook.com/scripts/toolbar.js"></script>
    </div>
  </div>
</body>
</html>
