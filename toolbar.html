<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Market Toolbar</title>

  <style>
    html, body {
      margin: 0;
      padding: 1px;
      background: #191919;
    }

    .box {
      width: 100%;
      height: 60px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    #mfxtoolbar {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="box">
  <div id="mfxtoolbar"></div>
</div>

<script type="text/javascript" src="https://widgets.myfxbook.com/scripts/toolbar.js"></script>

</body>
</html>
