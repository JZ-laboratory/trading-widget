<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>News Bar</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: #191919;
  overflow: hidden;
}

.box {
  width: 100%;
  height: 80px;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
}

iframe {
  width: 100%;
  height: 600px;
  border: none;
  transform: translateY(-200px);
  filter: invert(1) hue-rotate(180deg);
}
</style>

</head>

<body>

<div class="box">
  <iframe src="https://widget.myfxbook.com/widget/calendar.html?lang=en&impacts=3&symbols=USD,EUR,GBP"></iframe>
</div>

</body>
</html>
