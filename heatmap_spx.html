<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SPX Heatmap</title>

  <style>
    html, body {
      margin: 0;
      padding: 1px;
      background: #191919;
      color-scheme: dark;
    }

    .box {
      width: 500px;
      height: 400px;
      background: #191919;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }

    .tradingview-widget-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
<div class="box">
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>

    <script type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js"
      async>
    {
      "exchanges": ["US"],
      "dataSource": "SPX500",
      "grouping": "sector",
      "blockSize": "market_cap_basic",
      "blockColor": "change",
      "colorTheme": "dark",
      "locale": "en"
    }
    </script>

  </div>
</div>
</body>
</html>
